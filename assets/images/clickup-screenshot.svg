  <line x1="220" y1="235" x2="770" y2="235" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Task Items -->
  <!-- Task 1 -->
  <rect x="220" y="245" width="550" height="40" fill="#ffffff"/>
  <circle cx="235" cy="265" r="8" fill="#8a2be2"/>
  <text x="250" y="270" font-family="Arial" font-size="13" fill="#333333">Brand awareness campaign</text>
  <circle cx="670" cy="265" r="12" fill="#f0f0f5"/>
  <text x="740" y="270" font-family="Arial" font-size="12" fill="#777777">May 29</text>
  
  <!-- Task 2 -->
  <rect x="220" y="285" width="550" height="40" fill="#ffffff"/>
  <circle cx="235" cy="305" r="8" fill="#8a2be2"/>
  <text x="250" y="310" font-family="Arial" font-size="13" fill="#333333">Teaser Fall campaign</text>
  <circle cx="670" cy="305" r="12" fill="#f0f0f5"/>
  <text x="740" y="310" font-family="Arial" font-size="12" fill="#777777">May 30</text>
  
  <!-- Task 3 -->
  <rect x="220" y="325" width="550" height="40" fill="#ffffff"/>
  <circle cx="235" cy="345" r="8" fill="#ff6b6b"/>
  <text x="250" y="350" font-family="Arial" font-size="13" fill="#333333">"Find joy" campaign</text>
  
  <!-- Play Button -->
  <circle cx="510" cy="345" r="15" fill="#8a2be2"/>
  <polygon points="505,338 505,352 518,345" fill="#ffffff"/>
  <text x="535" y="350" font-family="Arial" font-size="12" fill="#8a2be2">Play</text>
  
  <circle cx="670" cy="345" r="12" fill="#f0f0f5"/>
  <text x="740" y="350" font-family="Arial" font-size="12" fill="#777777">May 16</text>
  
  <!-- Task 4 -->
  <rect x="220" y="365" width="550" height="40" fill="#ffffff"/>
  <circle cx="235" cy="385" r="8" fill="#00bfff"/>
  <text x="250" y="390" font-family="Arial" font-size="13" fill="#333333">"Be you" campaign</text>
  <circle cx="670" cy="385" r="12" fill="#f0f0f5"/>
  <text x="740" y="390" font-family="Arial" font-size="12" fill="#777777">May 18</text>
  
  <!-- Task 5 -->
  <rect x="220" y="405" width="550" height="40" fill="#ffffff"/>
  <circle cx="235" cy="425" r="8" fill="#ff6b6b"/>
  <text x="250" y="430" font-family="Arial" font-size="13" fill="#333333">Email marketing campaign</text>
  <circle cx="670" cy="425" r="12" fill="#f0f0f5"/>
  <text x="740" y="430" font-family="Arial" font-size="12" fill="#777777">May 12</text>

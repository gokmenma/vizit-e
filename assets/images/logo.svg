<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e24"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <filter id="logo-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background SQUIRCLE with smooth rounded corners and a subtle white border -->
  <path d="M 50,2 
           C 15,2 2,15 2,50 
           C 2,85 15,98 50,98 
           C 85,98 98,85 98,50 
           C 98,15 85,2 50,2 Z" 
        fill="url(#logo-bg)" 
        stroke="#ffffff" 
        stroke-width="1.5" 
        stroke-opacity="0.15"/>
  
  <!-- Inner Symbol: Dynamic V + Pulse line (No leaf loop, pure white) -->
  <path d="M 22 52 
           C 26 52, 28 52, 31 52 
           C 34 52, 36 38, 39 38 
           C 42 38, 44 68, 47 68 
           C 50 68, 52 48, 54 48
           L 78 22" 
        stroke="#ffffff" 
        stroke-width="7" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#logo-glow)" />
</svg>

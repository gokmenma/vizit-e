<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Blur effect için arka plan elementi -->
<table role="presentation" cellspacing="0" cellpadding="0" border="0" style="position: relative;">
    <tr>
        <td align="center" style="padding: 40px;">
            
            <!-- Background blur effect simulation -->
            <div style="position: relative; display: inline-block;">
                
                <!-- Blur background (pseudo-element replacement) -->
                <div style="
                    position: absolute;
                    top: -20px;
                    left: -10px;
                    right: -10px;
                    bottom: -20px;
                    z-index: 1;
                    border-radius: 25px;
                    opacity: 0.6;
                    transform: scale(0.75);
                "></div>
                
              Merhaba bu b
                
            </div>
            
        </td>
    </tr>
</table>
</body>
</html>
